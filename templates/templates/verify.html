<!DOCTYPE html>
<html>
<head>
<title>Verify OTP</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #0f2027, #2c5364);
    color: white;
    text-align: center;
}

.box {
    background: white;
    color: black;
    width: 300px;
    margin: auto;
    margin-top: 100px;
    padding: 20px;
    border-radius: 15px;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px;
    border-radius: 5px;
    border: 1px solid gray;
}

button {
    background: green;
    color: white;
    padding: 10px;
    width: 95%;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="box">
<h2>Enter OTP</h2>

<form action="/verify" method="POST">
<input name="otp" placeholder="Enter OTP" required><br>
<button>Verify</button>
</form>

</div>

</body>
</html>
